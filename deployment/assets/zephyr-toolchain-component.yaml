name: ZephyrToolchain
description: >
  Installs the complete Zephyr RTOS Embedded Toolchain Layer on Ubuntu 24.04 arm64 (Graviton).
  Follows the official Zephyr Getting Started Guide:
  https://docs.zephyrproject.org/latest/develop/getting_started/index.html
  Covers all SOCA QEMU emulation cases: qemu_cortex_m3, qemu_cortex_r5,
  qemu_cortex_a53, and the HVAC MQTT scenario.
schemaVersion: 1.0

phases:
  - name: build
    steps:

      - name: InstallAptDependencies
        action: ExecuteBash
        # Official Zephyr apt package list for Ubuntu 24.04.
        # NOTE: gcc-multilib and g++-multilib are intentionally omitted —
        #       they are not available on AArch64 (arm64) systems.
        inputs:
          commands:
            - |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y
              apt-get install -y --no-install-recommends \
                git cmake ninja-build gperf ccache dfu-util \
                device-tree-compiler wget \
                python3-dev python3-pip python3-setuptools \
                python3-tk python3-wheel python3-venv \
                xz-utils file make gcc g++ \
                libsdl2-dev libmagic1 \
                qemu-system-arm qemu-system-misc \
                mosquitto mosquitto-clients \
                iproute2 socat

      - name: VerifyMinimumVersions
        action: ExecuteBash
        # Sanity-check the minimum required versions per official docs:
        # CMake >= 3.20.5, Python >= 3.12, dtc >= 1.4.6
        inputs:
          commands:
            - cmake --version
            - python3 --version
            - dtc --version

      - name: CreateVenvAndInstallWest
        action: ExecuteBash
        inputs:
          commands:
            - python3 -m venv /opt/zephyrproject/.venv
            - /opt/zephyrproject/.venv/bin/pip install --upgrade pip
            - /opt/zephyrproject/.venv/bin/pip install west

      - name: WestInit
        action: ExecuteBash
        timeoutSeconds: 300
        # Initialises the west workspace — downloads zephyr manifest only.
        inputs:
          commands:
            - /opt/zephyrproject/.venv/bin/west init /opt/zephyrproject

      - name: WestUpdate
        action: ExecuteBash
        timeoutSeconds: 3600
        # Downloads all Zephyr modules (HALs, MCUboot, CMSIS, …) ~2 GB.
        inputs:
          commands:
            - cd /opt/zephyrproject && /opt/zephyrproject/.venv/bin/west update

      - name: ZephyrExport
        action: ExecuteBash
        # Exports the Zephyr CMake package so west-build can find it
        # without needing ZEPHYR_BASE set explicitly.
        inputs:
          commands:
            - cd /opt/zephyrproject/zephyr && /opt/zephyrproject/.venv/bin/west zephyr-export

      - name: InstallPythonDependencies
        action: ExecuteBash
        timeoutSeconds: 300
        # Official method: west packages pip --install
        # (replaces the legacy: pip install -r zephyr/scripts/requirements.txt)
        inputs:
          commands:
            - cd /opt/zephyrproject/zephyr && /opt/zephyrproject/.venv/bin/west packages pip --install

      - name: InstallZephyrSDK
        action: ExecuteBash
        timeoutSeconds: 1800
        # Installs toolchains for all PLAN.md QEMU cases:
        #   arm-zephyr-eabi  → Cases 1, 2, 4 (Cortex-M3, Cortex-R5, HVAC)
        #   aarch64-zephyr-elf → Case 3 (Cortex-A53 / AArch64)
        # Also installs host tools (custom QEMU, OpenOCD) via -h flag.
        inputs:
          commands:
            - |
              cd /opt/zephyrproject/zephyr
              /opt/zephyrproject/.venv/bin/west sdk install \
                --install-dir /opt/zephyr-sdk \
                -t arm-zephyr-eabi \
                -t aarch64-zephyr-elf

      - name: SetPermissionsAndSmokeTest
        action: ExecuteBash
        # Make toolchain world-readable so any SOCA user can use it.
        # Smoke-test that key binaries are functional.
        inputs:
          commands:
            - chmod -R 755 /opt/zephyrproject /opt/zephyr-sdk
            - echo "=== West version ==="
            - /opt/zephyrproject/.venv/bin/west --version
            - echo "=== ARM cross-compiler ==="
            - /opt/zephyr-sdk/arm-zephyr-eabi/bin/arm-zephyr-eabi-gcc --version
            - echo "=== AArch64 cross-compiler ==="
            - /opt/zephyr-sdk/aarch64-zephyr-elf/bin/aarch64-zephyr-elf-gcc --version
            - echo "=== QEMU ARM ==="
            - qemu-system-arm --version
            - echo "=== QEMU AArch64 ==="
            - qemu-system-aarch64 --version
            - echo "=== Mosquitto ==="
            - mosquitto --help | head -1
            - echo "=== Toolchain installation complete ==="
